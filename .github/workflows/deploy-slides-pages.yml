name: Deploy Slides to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: slides
        run: npm ci

      - name: Build landing deck
        working-directory: slides
        run: npm run build -- --base "/${{ github.event.repository.name }}/"

      - name: Build introduction deck
        working-directory: slides
        run: |
          npm run build:deck -- decks/introduction.md --base "/${{ github.event.repository.name }}/introduction/"
          mkdir -p dist/introduction
          cp -R decks/dist/. dist/introduction/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
